version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: czyj-postgres
    restart: always
    environment:
      POSTGRES_USER: czyj
      POSTGRES_PASSWORD: Czyj@2026Dev
      POSTGRES_DB: czyj_db
    ports:
      - "5433:5432"
    volumes:
      - czyj_postgres_data:/var/lib/postgresql/data
    networks:
      - czyj-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U czyj"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: czyj-redis
    restart: always
    command: redis-server --requirepass CzyjRedis2026
    ports:
      - "6380:6379"
    volumes:
      - czyj_redis_data:/data
    networks:
      - czyj-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "CzyjRedis2026", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: czyj-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: czyjadmin
      MINIO_ROOT_PASSWORD: CzyjMinio2026
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - czyj_minio_data:/data
    networks:
      - czyj-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: czyj-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://czyj:Czyj%402026Dev@postgres:5432/czyj_db
      REDIS_URL: redis://:CzyjRedis2026@redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: czyjadmin
      MINIO_SECRET_KEY: CzyjMinio2026
      MINIO_BUCKET: czyj-files
      MINIO_SECURE: "false"
      JWT_SECRET: czyj-jwt-secret-key-2026-production-change-me
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      SMS_TEST_CODE: "123456"
      APP_NAME: 成长印记
      APP_ENV: production
      DEBUG: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - czyj-net

  frontend:
    image: nginx:alpine
    container_name: czyj-frontend
    restart: always
    ports:
      - "8001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - czyj-net

volumes:
  czyj_postgres_data:
  czyj_redis_data:
  czyj_minio_data:

networks:
  czyj-net:
    driver: bridge
